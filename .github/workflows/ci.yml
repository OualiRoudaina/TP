name: CI React Node

# Évite les avertissements de dépréciation Node 20 sur les actions (changelog GitHub 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: 2. Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # npm 11+ est plus strict sur le lockfile ; les projets CRA peuvent échouer avec "EUSAGE".
      - name: 2b. Utiliser npm 10 pour npm ci
        run: npm install -g npm@10.9.2

      - name: 3. Mettre en cache les dépendances npm du frontend
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: 4. Installer les dépendances du frontend
        run: |
          cd frontend
          npm ci

      - name: 5. Lancer ESLint sur le frontend
        run: |
          cd frontend
          npm run lint

      - name: 6. Exécuter les tests frontend avec couverture
        run: |
          cd frontend
          npm run test:ci

      - name: 7. Construire l'application React
        run: |
          cd frontend
          npm run build

      - name: 8. Construire l'image Docker du frontend
        run: |
          docker build -t frontend-app:latest ./frontend

      - name: Publier la couverture frontend pour Sonar
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: 2. Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 2b. Utiliser npm 10 pour npm ci
        run: npm install -g npm@10.9.2

      - name: 3. Mettre en cache les dépendances npm du backend
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: 4. Installer les dépendances du backend
        run: |
          cd backend
          npm ci

      - name: 5. Lancer ESLint sur le backend
        run: |
          cd backend
          npm run lint

      - name: 6. Exécuter les tests backend avec couverture
        run: |
          cd backend
          npm test

      - name: 7. Construire l'image Docker du backend
        run: |
          docker build -t backend-app:latest ./backend

      - name: Publier la couverture backend pour Sonar
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  sonarqube:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Télécharger la couverture frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Télécharger la couverture backend
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Installer Java (requis par sonar-scanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Analyse SonarCloud
        run: npx sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
