# Remplacez YOUR_SONARCLOUD_ORG par l'identifiant d'organisation SonarCloud (Settings > Organization Key)
sonar.organization=YOUR_SONARCLOUD_ORG
sonar.projectKey=mon-projet-react-node
sonar.projectName=Mon Projet React Node

sonar.host.url=https://sonarcloud.io

sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src,backend/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/__tests__/**/*
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
sonar.sourceEncoding=UTF-8
